services:
  webapp:
    build: app # build from Dockerfile in app
    platform: linux/amd64
    ports:
      - "80:8501"
    env_file:
      - ./app/.env
    volumes:
      - ${GCP_SERVICE_ACCOUNT_KEY}:/tmp/gcp-key.json
    networks:
      - app-network
    depends_on:
      - api-server
  
  api-server:
    build: datasources # build from a Dockerfile in datasources
    platform: linux/amd64
    ports:
      - "8000:8000"
    networks:
      - app-network
    env_file:
      - ./app/.env
    volumes:
      - ${GCP_SERVICE_ACCOUNT_KEY}:/tmp/gcp-key.json
  
  cron:
    build: crontab
    depends_on: # To control the order of service startup and shutdown.
      - api-server # depends on it
    networks:
      - app-network # name of the network
networks: # Networks let services communicate with each other
  # By default, services can all communicate.
  app-network: # In this case, we don't actually need extra network. 
